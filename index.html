<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vegas 출장">
  <title>🎰 Vegas 출장 일정</title>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --meeting:      #3B82F6;
      --meeting-bg:   #EFF6FF;
      --dining:       #F97316;
      --dining-bg:    #FFF7ED;
      --transport:    #10B981;
      --transport-bg: #ECFDF5;
      --leisure:      #8B5CF6;
      --leisure-bg:   #F5F3FF;
      --bg:           #F1F5F9;
      --card:         #FFFFFF;
      --text:         #1E293B;
      --muted:        #94A3B8;
      --border:       #E2E8F0;
      --dark:         #0F172A;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 90px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      background: linear-gradient(160deg, #0F172A 0%, #1E3A5F 100%);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 16px 8px;
    }

    .header-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.4px; }
    .header-sub   { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }

    /* Sync badge */
    .sync-badge {
      font-size: 11px; font-weight: 600;
      padding: 4px 9px; border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.65);
      flex-shrink: 0; white-space: nowrap;
    }
    .sync-badge.ok  { background: rgba(16,185,129,0.25); color: #6EE7B7; }
    .sync-badge.off { background: rgba(239,68,68,0.2);   color: #FCA5A5; }

    /* Timezone button */
    .tz-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 22px;
      padding: 7px 13px;
      color: #fff;
      cursor: pointer;
      text-align: center;
      font-family: inherit;
      flex-shrink: 0;
    }
    .tz-btn-label { display: block; font-size: 10px; font-weight: 600; opacity: 0.65; letter-spacing: 0.3px; }
    .tz-btn-time  { display: block; font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums; }

    /* Day Tabs */
    .day-tabs {
      display: flex;
      overflow-x: auto;
      padding: 0 10px 8px;
      gap: 4px;
      scrollbar-width: none;
    }
    .day-tabs::-webkit-scrollbar { display: none; }

    .day-tab {
      flex-shrink: 0;
      padding: 5px 11px 6px;
      border-radius: 22px;
      cursor: pointer;
      color: rgba(255,255,255,0.42);
      text-align: center;
      transition: all 0.18s;
      border: 1.5px solid transparent;
    }
    .day-tab .dn { display: block; font-size: 15px; font-weight: 800; color: rgba(255,255,255,0.52); }
    .day-tab .dd { display: block; font-size: 11px; font-weight: 600; }
    .day-tab .dw { display: block; font-size: 12px; margin-top: 2px; min-height: 14px; }
    .day-tab.active { background: #fff; color: var(--dark); border-color: #fff; }
    .day-tab.active .dn { color: var(--dark); }
    .day-tab.today .dn::after {
      content: ''; display: block;
      width: 5px; height: 5px;
      background: #F97316;
      border-radius: 50%;
      margin: 2px auto 0;
    }

    /* Weather bar */
    .weather-bar {
      display: none;
      align-items: center;
      gap: 7px;
      padding: 6px 18px 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.72);
      border-top: 1px solid rgba(255,255,255,0.09);
    }
    .w-icon { font-size: 15px; }
    .w-cond { font-weight: 700; }
    .w-sep  { opacity: 0.35; }
    .w-loc  { margin-left: auto; font-size: 11px; opacity: 0.5; }

    /* ── Stats ──────────────────────────────────────────────────── */
    .stats-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 11px 16px 12px;
    }
    .stats-top { font-size: 12px; color: var(--muted); margin-bottom: 9px; }
    .stats-top strong { color: var(--text); font-size: 14px; }
    .stats-chips { display: flex; flex-wrap: wrap; gap: 7px; }

    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 11px; border-radius: 20px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 2px solid transparent; transition: all 0.15s;
      user-select: none;
    }
    .chip.meeting   { background: var(--meeting-bg);   color: var(--meeting); }
    .chip.dining    { background: var(--dining-bg);    color: var(--dining); }
    .chip.transport { background: var(--transport-bg); color: var(--transport); }
    .chip.leisure   { background: var(--leisure-bg);   color: var(--leisure); }
    .chip.on  { border-color: currentColor; }
    .chip.dim { opacity: 0.35; }

    /* ── Events ─────────────────────────────────────────────────── */
    .events { padding: 14px 14px 0; }

    .empty { text-align: center; padding: 64px 20px; color: var(--muted); }
    .empty-icon  { font-size: 52px; }
    .empty-label { font-size: 15px; font-weight: 600; color: #64748B; margin-top: 10px; }
    .empty-hint  { font-size: 13px; margin-top: 5px; }

    .event-card {
      background: var(--card); border-radius: 16px;
      padding: 14px 15px;
      display: flex; gap: 12px; cursor: pointer;
      border-left: 4px solid transparent;
      position: relative; z-index: 1; will-change: transform;
      -webkit-user-select: none;
    }
    .event-card:active { opacity: 0.8; }
    .event-card.meeting   { border-left-color: var(--meeting); }
    .event-card.dining    { border-left-color: var(--dining); }
    .event-card.transport { border-left-color: var(--transport); }
    .event-card.leisure   { border-left-color: var(--leisure); }

    .ev-time { flex-shrink: 0; width: 58px; text-align: right; padding-top: 2px; }
    .ev-start { font-size: 13px; font-weight: 700; }
    .ev-tz    { font-size: 10px; color: var(--muted); font-weight: 600; }
    .ev-end   { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .ev-end .ev-tz { display: inline; }

    .ev-dot-col { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding-top: 5px; }
    .ev-dot { width: 9px; height: 9px; border-radius: 50%; }
    .meeting   .ev-dot { background: var(--meeting); }
    .dining    .ev-dot { background: var(--dining); }
    .transport .ev-dot { background: var(--transport); }
    .leisure   .ev-dot { background: var(--leisure); }

    .ev-body  { flex: 1; min-width: 0; }
    .ev-badge { font-size: 11px; font-weight: 700; margin-bottom: 3px; }
    .meeting   .ev-badge { color: var(--meeting); }
    .dining    .ev-badge { color: var(--dining); }
    .transport .ev-badge { color: var(--transport); }
    .leisure   .ev-badge { color: var(--leisure); }

    .ev-title {
      font-size: 15px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .ev-place { font-size: 12px; color: var(--muted); display: flex; align-items: flex-start; gap: 3px; }
    .ev-memo  {
      font-size: 12px; color: #64748B; margin-top: 4px; line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .ev-multiday {
      display: inline-flex; align-items: center; gap: 3px;
      background: #F1F5F9; border-radius: 6px;
      padding: 2px 7px; font-size: 10px; font-weight: 700;
      color: #64748B; margin-top: 5px;
    }

    /* ── FAB ────────────────────────────────────────────────────── */
    .fab {
      position: fixed; bottom: 26px; right: 20px;
      width: 60px; height: 60px; border-radius: 30px;
      background: linear-gradient(135deg, #1E3A5F, #0F172A);
      color: #fff; font-size: 30px; border: none;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 24px rgba(15,23,42,0.45);
      cursor: pointer; z-index: 200; transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.88); }

    /* ── Sheet Modal ─────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 300; display: none; align-items: flex-end;
      backdrop-filter: blur(2px);
    }
    .overlay.open { display: flex; }

    .sheet {
      background: var(--card); border-radius: 24px 24px 0 0;
      width: 100%; max-height: 93vh; overflow-y: auto;
      padding-bottom: max(34px, env(safe-area-inset-bottom));
      animation: slideUp 0.25s cubic-bezier(0.32,0.72,0,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .sheet-handle { width: 38px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
    .sheet-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px 12px; border-bottom: 1px solid var(--border);
    }
    .sheet-title { font-size: 17px; font-weight: 800; }
    .sheet-close {
      background: var(--bg); border: none; width: 30px; height: 30px;
      border-radius: 15px; font-size: 16px; color: var(--muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    .sheet-body { padding: 18px 18px 0; }

    .fg { margin-bottom: 15px; }
    .fl { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px; }

    .fi {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 12px;
      font-size: 15px; font-family: inherit; background: #fff;
      outline: none; transition: border-color 0.18s;
      -webkit-appearance: none; color: var(--text);
    }
    .fi:focus { border-color: #1E3A5F; }
    .fi.err   { border-color: #EF4444; }
    textarea.fi { resize: none; height: 76px; }

    /* Timezone select below time input */
    select.tz-sel {
      margin-top: 6px;
      padding: 9px 10px;
      font-size: 12px;
      background: var(--bg);
      color: #475569;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .sub-label { display: block; font-size: 10px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }

    /* Category buttons */
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .cat-btn {
      padding: 11px 8px; border-radius: 12px; border: 2px solid var(--border);
      background: var(--card); font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center; transition: all 0.15s;
      font-family: inherit; color: var(--text);
    }
    .cat-btn.sel.meeting   { background: var(--meeting-bg);   border-color: var(--meeting);   color: var(--meeting); }
    .cat-btn.sel.dining    { background: var(--dining-bg);    border-color: var(--dining);    color: var(--dining); }
    .cat-btn.sel.transport { background: var(--transport-bg); border-color: var(--transport); color: var(--transport); }
    .cat-btn.sel.leisure   { background: var(--leisure-bg);   border-color: var(--leisure);   color: var(--leisure); }

    /* Action buttons */
    .btn-save {
      display: block; width: 100%; padding: 15px;
      background: linear-gradient(135deg, #1E3A5F, #0F172A);
      color: #fff; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; margin-top: 8px; transition: opacity 0.15s;
    }
    .btn-save:active { opacity: 0.8; }
    .btn-del {
      display: none; width: 100%; padding: 14px;
      background: none; border: 1.5px solid #FCA5A5;
      border-radius: 14px; color: #EF4444;
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: inherit; margin-top: 10px; margin-bottom: 4px;
      transition: background 0.15s;
    }
    .btn-del:active { background: #FEF2F2; }

    /* ── View Toggle ─────────────────────────────────────────────── */
    .view-toggle {
      display: flex;
      background: rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 3px;
      gap: 2px;
      flex-shrink: 0;
    }
    .vt-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.55);
      font-size: 13px; font-weight: 700; font-family: inherit;
      padding: 5px 13px; border-radius: 18px;
      cursor: pointer; transition: all 0.18s; white-space: nowrap;
    }
    .vt-btn.active { background: #fff; color: var(--dark); }

    /* ── Contacts ────────────────────────────────────────────────── */
    .contacts-section { padding: 14px 14px 0; display: none; }
    .contacts-section.visible { display: block; }

    .contact-card {
      background: var(--card); border-radius: 16px;
      padding: 14px 15px;
      display: flex; align-items: center; gap: 13px;
      border-left: 4px solid #1E3A5F;
      position: relative; z-index: 1; will-change: transform;
    }
    .contact-avatar {
      width: 42px; height: 42px; border-radius: 21px;
      background: linear-gradient(135deg, #1E3A5F, #3B82F6);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .contact-org  { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    .contact-phone a {
      font-size: 13px; font-weight: 600; color: #1E3A5F;
      text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
    }
    .contact-phone a:active { opacity: 0.6; }
    .contact-note { font-size: 12px; color: #64748B; margin-top: 3px; }
    .contact-edit {
      background: none; border: none; color: var(--muted);
      font-size: 16px; cursor: pointer; padding: 6px; flex-shrink: 0;
      border-radius: 8px; transition: color 0.15s;
    }
    .contact-edit:active { color: #1E3A5F; }

    /* ── Swipe-to-delete ─────────────────────────────────────────── */
    .swipe-wrapper {
      position: relative; overflow: hidden; border-radius: 16px;
      margin-bottom: 10px; box-shadow: 0 1px 5px rgba(0,0,0,0.07);
      -webkit-user-select: none; user-select: none;
    }
    .swipe-delete {
      position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
      background: #EF4444; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; cursor: pointer; border: none;
    }
  </style>
</head>
<body>

<!-- ── Header ────────────────────────────────────────────────────── -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">🎰 Vegas 출장 일정</div>
      <div class="header-sub">Mar 2 – Mar 8, 2026</div>
    </div>
    <div class="view-toggle">
      <button class="vt-btn active" id="vBtnSchedule" onclick="setView('schedule')">일정</button>
      <button class="vt-btn"        id="vBtnContacts"  onclick="setView('contacts')">연락처</button>
    </div>
    <span class="sync-badge" id="syncBadge"></span>
    <button class="tz-btn" onclick="cycleTz()">
      <span class="tz-btn-label" id="tzLabel">Las Vegas</span>
      <span class="tz-btn-time"  id="tzTime">--:--</span>
    </button>
  </div>
  <div class="day-tabs"    id="dayTabs"></div>
  <div class="weather-bar" id="weatherBar"></div>
</div>

<!-- ── Stats ─────────────────────────────────────────────────────── -->
<div class="stats-bar" id="statsBar">
  <div class="stats-top">전체 <strong id="totalCount">0</strong>개 일정</div>
  <div class="stats-chips" id="statsChips"></div>
</div>

<!-- ── Events ────────────────────────────────────────────────────── -->
<div class="events" id="eventsContainer"></div>

<!-- ── Contacts ───────────────────────────────────────────────────── -->
<div class="contacts-section" id="contactsSection"></div>

<!-- ── FAB ───────────────────────────────────────────────────────── -->
<button class="fab" onclick="onFab()">+</button>

<!-- ── Sheet Modal ────────────────────────────────────────────────── -->
<div class="overlay" id="overlay" onclick="onOverlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title" id="sheetTitle">일정 추가</div>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-body">
      <input type="hidden" id="editId">

      <!-- Category -->
      <div class="fg">
        <span class="fl">카테고리</span>
        <div class="cat-grid">
          <button class="cat-btn meeting"   onclick="pickCat('meeting')">🤝 미팅</button>
          <button class="cat-btn dining"    onclick="pickCat('dining')">🍽️ 식사/네트워킹</button>
          <button class="cat-btn transport" onclick="pickCat('transport')">✈️ 이동/교통</button>
          <button class="cat-btn leisure"   onclick="pickCat('leisure')">🎰 여가</button>
        </div>
      </div>

      <!-- Title -->
      <div class="fg">
        <label class="fl" for="iTitle">제목 *</label>
        <input class="fi" type="text" id="iTitle" placeholder="일정 제목을 입력하세요">
      </div>

      <!-- Start / End Date -->
      <div class="fg">
        <span class="fl">날짜</span>
        <div class="two-col">
          <div>
            <span class="sub-label">시작일</span>
            <select class="fi" id="iStartDate" onchange="onStartDateChange()"></select>
          </div>
          <div>
            <span class="sub-label">종료일</span>
            <select class="fi" id="iEndDate"></select>
          </div>
        </div>
      </div>

      <!-- Start / End Time + per-field Timezone -->
      <div class="fg">
        <span class="fl">시간 & 시간대</span>
        <div class="two-col">
          <div>
            <span class="sub-label">시작</span>
            <input class="fi" type="time" id="iStart" step="300"
                   onchange="snapTime('iStart'); onStartTimeChange()">
            <select class="fi tz-sel" id="iStartTz">
              <option value="America/Los_Angeles">🌴 Vegas (PST)</option>
              <option value="Asia/Seoul">🏠 서울 (KST)</option>
            </select>
          </div>
          <div>
            <span class="sub-label">종료</span>
            <input class="fi" type="time" id="iEnd"   step="300"
                   onchange="snapTime('iEnd')">
            <select class="fi tz-sel" id="iEndTz">
              <option value="America/Los_Angeles">🌴 Vegas (PST)</option>
              <option value="Asia/Seoul">🏠 서울 (KST)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Place -->
      <div class="fg">
        <label class="fl" for="iPlace">장소</label>
        <input class="fi" type="text" id="iPlace" placeholder="장소 또는 주소">
      </div>

      <!-- Memo -->
      <div class="fg">
        <label class="fl" for="iMemo">메모</label>
        <textarea class="fi" id="iMemo" placeholder="추가 정보나 메모"></textarea>
      </div>

      <button class="btn-save" onclick="saveEvent()">저장</button>
      <button class="btn-del"  id="btnDel" onclick="deleteEvent()">🗑 이 일정 삭제</button>
    </div>
  </div>
</div>

<!-- ── Contact Sheet Modal ────────────────────────────────────────── -->
<div class="overlay" id="contactOverlay" onclick="onContactOverlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title" id="contactSheetTitle">연락처 추가</div>
      <button class="sheet-close" onclick="closeContactSheet()">✕</button>
    </div>
    <div class="sheet-body">
      <input type="hidden" id="cEditId">
      <div class="fg">
        <label class="fl" for="cName">이름 *</label>
        <input class="fi" type="text" id="cName" placeholder="이름 또는 업체명">
      </div>
      <div class="fg">
        <label class="fl" for="cOrg">소속</label>
        <input class="fi" type="text" id="cOrg" placeholder="소속 또는 업체 설명">
      </div>
      <div class="fg">
        <label class="fl" for="cPhone">전화번호 *</label>
        <input class="fi" type="tel" id="cPhone" placeholder="+1-702-000-0000">
      </div>
      <div class="fg">
        <label class="fl" for="cNote">메모</label>
        <textarea class="fi" id="cNote" placeholder="추가 정보나 메모"></textarea>
      </div>
      <button class="btn-save" onclick="saveContact()">저장</button>
      <button class="btn-del" id="cBtnDel" onclick="deleteContact()">🗑 이 연락처 삭제</button>
    </div>
  </div>
</div>

<script>
  // ── Service Worker 등록 ──────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/vegas-task/sw.js', { scope: '/vegas-task/' })

  // Migrate old {date:[events]} format to flat array

  // ── Storage ──────────────────────────────────────────────────────
  function getEvents() { return cachedEvents; }

  // tzId의 UTC 오프셋(분) 반환 — KST +540, PST -480
  function getOffsetMinutes(tzId, date) {
    const d     = new Date(`${date}T12:00:00Z`);
    const local = new Date(d.toLocaleString('en-US', {timeZone: tzId}));
    const utc   = new Date(d.toLocaleString('en-US', {timeZone: 'UTC'}));
    return (local - utc) / 60000;
  }

  // HH:MM 문자열을 fromTz → activeTz 로 변환해 반환
  function convertToActiveTz(time, fromTz, date) {
    if (!time || fromTz === activeTz) return time;
    const [h, m]   = time.split(':').map(Number);
    const utcMin   = (h * 60 + m) - getOffsetMinutes(fromTz, date);
    const localMin = utcMin + getOffsetMinutes(activeTz, date);
    const wrapped  = ((localMin % 1440) + 1440) % 1440;
    return `${String(Math.floor(wrapped / 60)).padStart(2,'0')}:${String(wrapped % 60).padStart(2,'0')}`;
  }

  // 이벤트 시작 시간을 UTC 분(숫자)으로 반환 → 정렬 키
  function toUTCMinutes(ev, date) {
    if (!ev.startTime) return Infinity;
    const [h, m] = ev.startTime.split(':').map(Number);
    const offset = getOffsetMinutes(ev.startTz || DEFAULT_TZ, date);
    return (h * 60 + m) - offset;
  }

  // 입력값을 가장 가까운 5분 단위로 스냅
  function snapTime(id) {
    const el = document.getElementById(id);
    if (!el.value) return;
    const [h, m]  = el.value.split(':').map(Number);
    const snapped = Math.round(m / 5) * 5;
    const finalM  = snapped % 60;
    const finalH  = (h + Math.floor(snapped / 60)) % 24;
    el.value = `${String(finalH).padStart(2,'0')}:${String(finalM).padStart(2,'0')}`;
  }

  // 시작 시간 변경 시 종료 시간이 비어있으면 +30분 자동 채우기
  function onStartTimeChange() {
    const endEl = document.getElementById('iEnd');
    if (endEl.value) return;
    const [h, m] = document.getElementById('iStart').value.split(':').map(Number);
    const totalM = h * 60 + m + 30;
    endEl.value  = `${String(Math.floor(totalM / 60) % 24).padStart(2,'0')}:${String(totalM % 60).padStart(2,'0')}`;
    document.getElementById('iEndTz').value = document.getElementById('iStartTz').value;
  }

  function eventsOn(date) {
    return getEvents()
      .filter(ev => {
        const s = ev.startDate;
        const e = ev.endDate || ev.startDate;
        return s <= date && date <= e;
      })
      .sort((a,b) => toUTCMinutes(a, date) - toUTCMinutes(b, date));
  }

  // ── Weather ──────────────────────────────────────────────────────
  async function fetchWeather() {
    try {
      const res = await fetch(
        'https://api.open-meteo.com/v1/forecast' +
        '?latitude=36.1699&longitude=-115.1398' +
        '&daily=temperature_2m_max,temperature_2m_min,weathercode' +
        '&temperature_unit=celsius' +
        '&timezone=America%2FLos_Angeles' +
        '&start_date=2026-03-02&end_date=2026-03-08'
      );
      const j = await res.json();
      weatherData = {};
      j.daily.time.forEach((date, i) => {
        weatherData[date] = {
          max:  Math.round(j.daily.temperature_2m_max[i]),
          min:  Math.round(j.daily.temperature_2m_min[i]),
          code: j.daily.weathercode[i],
        };
      });
      renderTabs();
      renderWeather();
    } catch(e) { console.warn('Weather fetch failed:', e); }
  }

  // ── Timezone clock ───────────────────────────────────────────────

    const t  = new Date().toLocaleTimeString('ko-KR', {
      timeZone: activeTz, hour:'2-digit', minute:'2-digit', hour12: false,

    const tz = TZ_LIST.find(x => x.id === activeTz);
    document.getElementById('tzLabel').textContent = tz ? tz.label : '';
    document.getElementById('tzTime').textContent  = t;

  function cycleTz() {
    const idx = TZ_LIST.findIndex(t => t.id === activeTz);
    activeTz  = TZ_LIST[(idx + 1) % TZ_LIST.length].id;
    localStorage.setItem(TZ_KEY, activeTz);
    updateClock();
    renderEvents();
  }

  function renderTabs() {
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('dayTabs').innerHTML = DAYS.map(d => {
      const w  = weatherData?.[d.date];
      const we = w ? wmo(w.code).e : '';
      return `<div class="day-tab${d.date===activeDate?' active':''}${d.date===today?' today':''}"
                   onclick="switchDay('${d.date}')">
        <span class="dn">${d.label}</span>
        <span class="dd">${d.day}</span>
        <span class="dw">${we}</span>
      </div>`;
    }).join('');
  }

  function renderWeather() {
    const el = document.getElementById('weatherBar');
    const w  = weatherData?.[activeDate];
    if (!w) { el.style.display = 'none'; return; }
    const info = wmo(w.code);
    el.style.display = 'flex';
    el.innerHTML = `
      <span class="w-icon">${info.e}</span>
      <span class="w-cond">${info.l}</span>
      <span class="w-sep">·</span>
      <span>최저 ${w.min}° / 최고 ${w.max}°</span>
      <span class="w-loc">📍 Las Vegas, NV</span>`;
  }

  function renderStats() {
    const all    = getEvents();
    const counts = {meeting:0, dining:0, transport:0, leisure:0};
    all.forEach(ev => { if (ev.cat in counts) counts[ev.cat]++; });
    document.getElementById('totalCount').textContent = all.length;
    document.getElementById('statsChips').innerHTML = Object.entries(CATS).map(([k,c]) => {
      const on  = filters.has(k);
      const dim = filters.size > 0 && !on;
      return `<div class="chip ${k}${on?' on':''}${dim?' dim':''}" onclick="toggleFilter('${k}')">
        ${c.icon} ${c.label} <strong>${counts[k]}</strong>
      </div>`;
    }).join('');
  }

  function renderEvents() {
    const list  = eventsOn(activeDate);
    const shown = filters.size ? list.filter(ev => filters.has(ev.cat)) : list;
    const el    = document.getElementById('eventsContainer');

    if (!shown.length) {
      el.innerHTML = `<div class="empty">
        <div class="empty-icon">📅</div>
        <div class="empty-label">일정이 없습니다</div>
        <div class="empty-hint">+ 버튼으로 새 일정을 추가하세요</div>
      </div>`;
      return;
    }

    el.innerHTML = shown.map(ev => {
      const isMulti   = ev.endDate && ev.endDate !== ev.startDate;
      const stz       = ev.startTz || DEFAULT_TZ;
      const etz       = ev.endTz   || DEFAULT_TZ;
      const dispStart = convertToActiveTz(ev.startTime, stz, ev.startDate || activeDate);
      const dispEnd   = convertToActiveTz(ev.endTime,   etz, ev.endDate   || activeDate);
      const abbrLabel = `<span class="ev-tz">${tzAbbr(activeTz)}</span>`;
      const fmt       = d => d ? d.slice(5).replace('-','/') : '';
      const multiTag  = isMulti
        ? `<div class="ev-multiday">🗓 ${fmt(ev.startDate)} ~ ${fmt(ev.endDate)}</div>`
        : '';
      return `<div class="swipe-wrapper" data-id="${ev.id}" data-type="event">
        <div class="swipe-delete">삭제</div>
        <div class="event-card ${ev.cat}">
          <div class="ev-time">
            <div class="ev-start">${dispStart || '--:--'} ${abbrLabel}</div>
            ${dispEnd ? `<div class="ev-end">${dispEnd} ${abbrLabel}</div>` : ''}

          </div>
        </div>
      </div>`;
    }).join('');
    initSwipes();
  }

  function openSheet(id = null) {
    editingId = id;

    if (id) {
      const ev = getEvents().find(e => e.id === id);
      if (!ev) return;
      document.getElementById('sheetTitle').textContent   = '일정 수정';
      document.getElementById('iStartDate').value = ev.startDate || activeDate;
      document.getElementById('iEndDate').value   = ev.endDate   || ev.startDate || activeDate;
      document.getElementById('iTitle').value     = ev.title     || '';
      document.getElementById('iStart').value     = ev.startTime || '';
      document.getElementById('iStartTz').value   = ev.startTz   || DEFAULT_TZ;
      document.getElementById('iEnd').value       = ev.endTime   || '';
      document.getElementById('iEndTz').value     = ev.endTz     || DEFAULT_TZ;
      document.getElementById('iPlace').value     = ev.place     || '';
      document.getElementById('iMemo').value      = ev.memo      || '';

      document.getElementById('sheetTitle').textContent   = '일정 추가';

      document.getElementById('iEndDate').value   = activeDate;
      document.getElementById('iStartTz').value   = activeTz;
      document.getElementById('iEndTz').value     = activeTz;

        document.getElementById(i).value = ''

      document.getElementById('iTitle').classList.remove('err');
      document.getElementById('btnDel').style.display = 'none';
      pickCat('meeting');

    document.getElementById('overlay').classList.add('open');

    document.getElementById('overlay').classList.remove('open');
    editingId = null;

      `<option value="${d.date}">${d.label}(${d.day})</option>`

  // ── CRUD ─────────────────────────────────────────────────────────
  function saveEvent() {
    const title   = document.getElementById('iTitle').value.trim();
    const titleEl = document.getElementById('iTitle');
    if (!title) { titleEl.classList.add('err'); titleEl.focus(); return; }
    titleEl.classList.remove('err');

    const startDate = document.getElementById('iStartDate').value;
    let   endDate   = document.getElementById('iEndDate').value;
    if (endDate < startDate) endDate = startDate;

    const ev = {
      id:        editingId || uid(),
      cat:       selCat,
      title,
      startDate,
      endDate,
      startTime: document.getElementById('iStart').value,
      startTz:   document.getElementById('iStartTz').value,
      endTime:   document.getElementById('iEnd').value,
      endTz:     document.getElementById('iEndTz').value,
      place:     document.getElementById('iPlace').value.trim(),
      memo:      document.getElementById('iMemo').value.trim(),
    };

    let events = getEvents().slice();
    if (editingId) events = events.filter(e => e.id !== editingId);
    events.push(ev);
    saveAll(events);

    closeSheet();
    activeDate = startDate;
    if (!firebaseReady) render();  // Firebase listener handles render when connected
  }

  function deleteEvent() {
    if (!editingId || !confirm('이 일정을 삭제할까요?')) return;
    saveAll(getEvents().filter(e => e.id !== editingId));
    closeSheet();
    if (!firebaseReady) render();
  }

    const cs = document.getElementById('contactsSection');
    if (isSch) { cs.classList.remove('visible'); }
    else       { cs.classList.add('visible'); renderContacts(); }
  }

  function onFab() {
    activeView === 'schedule' ? openSheet() : openContactSheet();
  }

  // ── Render Contacts ───────────────────────────────────────────────
  function renderContacts() {
    const el = document.getElementById('contactsSection');
    if (!cachedContacts.length) {
      el.innerHTML = `<div class="empty">
        <div class="empty-icon">👥</div>
        <div class="empty-label">연락처가 없습니다</div>
        <div class="empty-hint">+ 버튼으로 연락처를 추가하세요</div>
      </div>`;
      return;
    }
    el.innerHTML = cachedContacts.map(c => `
      <div class="swipe-wrapper" data-id="${c.id}" data-type="contact">
        <div class="swipe-delete">삭제</div>
        <div class="contact-card">
          <div class="contact-avatar">👤</div>
          <div class="contact-info">
            <div class="contact-name">${esc(c.name)}</div>
            ${c.org  ? `<div class="contact-org">${esc(c.org)}</div>` : ''}
            <div class="contact-phone"><a href="tel:${esc(c.phone)}">📞 ${esc(c.phone)}</a></div>
            ${c.note ? `<div class="contact-note">${esc(c.note)}</div>` : ''}
          </div>
          <button class="contact-edit" onclick="openContactSheet('${c.id}')">✎</button>
        </div>
      </div>
    `).join('');
    initSwipes();
  }

  // ── Contact Sheet ─────────────────────────────────────────────────
  function openContactSheet(id = null) {
    editingContactId = id;
    if (id) {
      const c = cachedContacts.find(x => x.id === id);
      if (!c) return;
      document.getElementById('contactSheetTitle').textContent = '연락처 수정';
      document.getElementById('cName').value  = c.name  || '';
      document.getElementById('cOrg').value   = c.org   || '';
      document.getElementById('cPhone').value = c.phone || '';
      document.getElementById('cNote').value  = c.note  || '';
      document.getElementById('cBtnDel').style.display = 'block';
    } else {
      document.getElementById('contactSheetTitle').textContent = '연락처 추가';
      ['cName','cOrg','cPhone','cNote'].forEach(i => document.getElementById(i).value = '');
      document.getElementById('cBtnDel').style.display = 'none';
    }
    document.getElementById('cName').classList.remove('err');
    document.getElementById('cPhone').classList.remove('err');
    document.getElementById('contactOverlay').classList.add('open');
  }

  function closeContactSheet() {
    document.getElementById('contactOverlay').classList.remove('open');
    editingContactId = null;
  }

  function onContactOverlayClick(e) { if (e.target === e.currentTarget) closeContactSheet(); }

  function saveContact() {
    const name  = document.getElementById('cName').value.trim();
    const phone = document.getElementById('cPhone').value.trim();
    let valid = true;
    if (!name)  { document.getElementById('cName').classList.add('err');  valid = false; }
    if (!phone) { document.getElementById('cPhone').classList.add('err'); valid = false; }
    if (!valid) return;

    const c = {
      id:    editingContactId || uid(),
      name,
      org:   document.getElementById('cOrg').value.trim(),
      phone,
      note:  document.getElementById('cNote').value.trim(),
    };
    let contacts = cachedContacts.slice();
    if (editingContactId) contacts = contacts.filter(x => x.id !== editingContactId);
    contacts.push(c);
    saveAllContacts(contacts);
    closeContactSheet();
    if (!firebaseReady) renderContacts();
  }

  function deleteContact() {
    if (!editingContactId || !confirm('이 연락처를 삭제할까요?')) return;
    saveAllContacts(cachedContacts.filter(x => x.id !== editingContactId));
    closeContactSheet();
    if (!firebaseReady) renderContacts();
  }

  // ── Utils ─────────────────────────────────────────────────────────
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Swipe-to-delete ──────────────────────────────────────────────
  const DEL_W = 80; // 삭제 버튼 너비(px)

  function _closeOpenSwipe() {
    if (!_swipeOpenWrapper) return;
    const card = _swipeOpenWrapper.querySelector('.event-card, .contact-card');
    card.style.transition = 'transform 0.25s ease';
    card.style.transform  = 'translateX(0)';
    _swipeOpenWrapper._swOpen = false;
    _swipeOpenWrapper = null;
  }

  // 전역 마우스 핸들러 (데스크탑 드래그 지원)
  document.addEventListener('mousemove', e => {
    if (!_swipeActive) return;
    _swipeMoveAt(e.clientX, e.clientY);
  });
  document.addEventListener('mouseup', e => {
    if (!_swipeActive) return;
    _swipeEndAt(e.clientX);
  });
  // 카드 바깥 탭 → 열린 삭제 버튼 닫기
  document.addEventListener('click', e => {
    if (_swipeOpenWrapper && !_swipeOpenWrapper.contains(e.target)) _closeOpenSwipe();
  });

  function _swipeMoveAt(cx, cy) {
    const s = _swipeActive;
    const dx = cx - s.startX, dy = cy - s.startY;
    if (!s.horizSwipe) {
      if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return false;
      if (Math.abs(dx) >= Math.abs(dy)) s.horizSwipe = true;
      else { _swipeActive = null; return false; }
    }
    s.moved = true;
    const base = s.initOpen ? -DEL_W : 0;
    const nx   = Math.max(-DEL_W, Math.min(0, base + dx));
    s.card.style.transform = `translateX(${nx}px)`;
    return true;
  }

  function _swipeEndAt(cx) {
    const s = _swipeActive;
    _swipeActive = null;
    const dx = cx - s.startX;
    s.card.style.transition = 'transform 0.25s ease';
    if (s.initOpen) {
      // 열려 있던 카드: 오른쪽 스와이프 or 탭 → 닫기
      if (dx > 20 || !s.moved) {
        s.card.style.transform = 'translateX(0)';
        s.wrapper._swOpen = false;
        if (_swipeOpenWrapper === s.wrapper) _swipeOpenWrapper = null;
      } else {
        s.card.style.transform = `translateX(${-DEL_W}px)`;
      }
    } else {
      if (dx < -30) {
        // 왼쪽 스와이프 → 삭제 버튼 열기
        s.card.style.transform = `translateX(${-DEL_W}px)`;
        s.wrapper._swOpen = true;
        _swipeOpenWrapper = s.wrapper;
      } else {
        s.card.style.transform = 'translateX(0)';
        if (!s.moved && s.onTap) s.onTap(); // 탭 → 기존 동작
      }
    }
  }

  function initSwipes() {
    _swipeActive = null;
    document.querySelectorAll('.swipe-wrapper').forEach(wrapper => {
      if (wrapper._swipeInited) return; // 중복 초기화 방지
      wrapper._swipeInited = true;
      wrapper._swOpen      = false;

      const card   = wrapper.querySelector('.event-card, .contact-card');
      const delBtn = wrapper.querySelector('.swipe-delete');
      const id     = wrapper.dataset.id;
      const type   = wrapper.dataset.type;

      const onTap = type === 'event' ? () => openSheet(id) : null;
      const onDelete = type === 'event'
        ? () => { saveAll(getEvents().filter(e => e.id !== id)); render(); }
        : () => { saveAllContacts(cachedContacts.filter(c => c.id !== id)); renderContacts(); };

      delBtn.addEventListener('click', e => { e.stopPropagation(); onDelete(); });

      function startAt(cx, cy) {
        if (_swipeOpenWrapper && _swipeOpenWrapper !== wrapper) _closeOpenSwipe();
        _swipeActive = {
          card, wrapper, startX: cx, startY: cy,
          initOpen: wrapper._swOpen, horizSwipe: false, moved: false, onTap
        };
        card.style.transition = 'none';
      }

      card.addEventListener('touchstart', e => startAt(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
      card.addEventListener('touchmove', e => {
        if (!_swipeActive || _swipeActive.wrapper !== wrapper) return;
        if (_swipeMoveAt(e.touches[0].clientX, e.touches[0].clientY)) e.preventDefault();
      }, { passive: false });
      card.addEventListener('touchend', e => {
        if (!_swipeActive || _swipeActive.wrapper !== wrapper) return;
        _swipeEndAt(e.changedTouches[0].clientX);
      });
      card.addEventListener('mousedown', e => startAt(e.clientX, e.clientY));
    });
  }

  // ── Init ──────────────────────────────────────────────────────────
  render();
  updateClock();
  setInterval(updateClock, 30000);
  fetchWeather();
</script>
</body>
</html>
